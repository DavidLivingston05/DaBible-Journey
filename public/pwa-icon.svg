<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Container representing an App Icon -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Subtle inner boundary light -->
  <rect x="12" y="12" width="488" height="488" rx="100" fill="none" stroke="#6ee7b7" stroke-width="4" stroke-opacity="0.2" />

  <!-- Radiating light rays from behind the scripture -->
  <g opacity="0.25" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="210" x2="256" y2="100" />
    <line x1="256" y1="210" x2="334" y2="132" />
    <line x1="256" y1="210" x2="366" y2="210" />
    <line x1="256" y1="210" x2="334" y2="288" />
    <line x1="256" y1="210" x2="256" y2="320" />
    <line x1="256" y1="210" x2="178" y2="288" />
    <line x1="256" y1="210" x2="146" y2="210" />
    <line x1="256" y1="210" x2="178" y2="132" />
  </g>

  <!-- Central Star of Bethlehem/Grace -->
  <path d="M 256 120 L 261 145 L 286 150 L 261 155 L 256 180 L 251 155 L 226 150 L 251 145 Z" fill="url(#goldGrad)" filter="url(#glow)" />

  <!-- Glowing Bible Book Vector -->
  <g transform="translate(106, 180)" filter="url(#glow)">
    <!-- Pages outer base (white/gold block) -->
    <path d="M 12 180 Q 75 160 144 190 Q 213 160 288 180 L 288 35 L 213 25 Q 144 55 12 35 Z" fill="#ffffff" />
    
    <!-- Left page accent lines (simulating text lines) -->
    <path d="M 32 60 H 120 M 32 85 H 120 M 32 110 H 120 M 32 135 H 120" stroke="#b1f1de" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    
    <!-- Right page accent lines (simulating text lines) -->
    <path d="M 180 60 H 268 M 180 85 H 268 M 180 110 H 268 M 180 135 H 268" stroke="#b1f1de" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    
    <!-- Book Spine/Ribbon marker -->
    <path d="M 150 15 Q 150 100 150 205 L 144 205 L 144 15 Z" fill="url(#goldGrad)" />
    <path d="M 150 205 L 160 230 L 150 220 L 140 230 Z" fill="url(#goldGrad)" />
    
    <!-- Cover/shadow border -->
    <path d="M 6 186 Q 75 164 144 196 Q 213 164 294 186" fill="none" stroke="#047857" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
